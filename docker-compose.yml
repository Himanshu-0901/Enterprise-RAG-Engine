services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rag-llm-api
    environment:
      NODE_ENV: development
      API_PORT: 4000
      WEB_PORT: 3000
      APP_BASE_URL: http://localhost:3001
      DATABASE_URL: postgres://rag:rag@postgres:5432/rag_llm
      DATABASE_SHARDS_JSON: "{}"
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: rag-documents
      S3_ACCESS_KEY_ID: rag
      S3_SECRET_ACCESS_KEY: rag-password
      EMBEDDING_PROVIDER: deterministic
      EMBEDDING_DIMENSIONS: 1536
      OPENAI_API_KEY: replace-me
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      LLM_PROVIDER: deterministic
      OPENAI_GENERATION_MODEL: gpt-4.1-mini
      ANTHROPIC_API_KEY: replace-me
      ANTHROPIC_GENERATION_MODEL: claude-3-5-haiku-latest
      LLM_MAX_OUTPUT_TOKENS: 700
      LLM_INPUT_TOKEN_COST_PER_1M: 0
      LLM_OUTPUT_TOKEN_COST_PER_1M: 0
      DOCUMENT_PARSER: google_document_ai
      GOOGLE_DOCUMENT_AI_PROJECT_ID:
      GOOGLE_DOCUMENT_AI_LOCATION: us
      GOOGLE_DOCUMENT_AI_PROCESSOR_ID:
      STRIPE_SECRET_KEY: replace-me
      STRIPE_STARTER_PRICE_ID:
      STRIPE_PRO_PRICE_ID:
      STRIPE_ENTERPRISE_PRICE_ID:
      RETENTION_CLEANUP_INTERVAL_MINUTES: 1440
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rag-llm-web
    environment:
      NODE_ENV: development
      WEB_PORT: 3000
      API_PORT: 4000
      APP_BASE_URL: http://localhost:3001
      DATABASE_URL: postgres://rag:rag@postgres:5432/rag_llm
      DATABASE_SHARDS_JSON: "{}"
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: rag-documents
      S3_ACCESS_KEY_ID: rag
      S3_SECRET_ACCESS_KEY: rag-password
      EMBEDDING_PROVIDER: deterministic
      EMBEDDING_DIMENSIONS: 1536
      OPENAI_API_KEY: replace-me
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      LLM_PROVIDER: deterministic
      OPENAI_GENERATION_MODEL: gpt-4.1-mini
      ANTHROPIC_API_KEY: replace-me
      ANTHROPIC_GENERATION_MODEL: claude-3-5-haiku-latest
      LLM_MAX_OUTPUT_TOKENS: 700
      LLM_INPUT_TOKEN_COST_PER_1M: 0
      LLM_OUTPUT_TOKEN_COST_PER_1M: 0
      DOCUMENT_PARSER: google_document_ai
      GOOGLE_DOCUMENT_AI_PROJECT_ID:
      GOOGLE_DOCUMENT_AI_LOCATION: us
      GOOGLE_DOCUMENT_AI_PROCESSOR_ID:
      STRIPE_SECRET_KEY: replace-me
      STRIPE_STARTER_PRICE_ID:
      STRIPE_PRO_PRICE_ID:
      STRIPE_ENTERPRISE_PRICE_ID:
      RETENTION_CLEANUP_INTERVAL_MINUTES: 1440
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: rag-llm-worker
    environment:
      NODE_ENV: development
      API_PORT: 4000
      WEB_PORT: 3000
      APP_BASE_URL: http://localhost:3001
      DATABASE_URL: postgres://rag:rag@postgres:5432/rag_llm
      DATABASE_SHARDS_JSON: "{}"
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: rag-documents
      S3_ACCESS_KEY_ID: rag
      S3_SECRET_ACCESS_KEY: rag-password
      EMBEDDING_PROVIDER: deterministic
      EMBEDDING_DIMENSIONS: 1536
      OPENAI_API_KEY: replace-me
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      LLM_PROVIDER: deterministic
      OPENAI_GENERATION_MODEL: gpt-4.1-mini
      ANTHROPIC_API_KEY: replace-me
      ANTHROPIC_GENERATION_MODEL: claude-3-5-haiku-latest
      LLM_MAX_OUTPUT_TOKENS: 700
      LLM_INPUT_TOKEN_COST_PER_1M: 0
      LLM_OUTPUT_TOKEN_COST_PER_1M: 0
      DOCUMENT_PARSER: google_document_ai
      GOOGLE_DOCUMENT_AI_PROJECT_ID:
      GOOGLE_DOCUMENT_AI_LOCATION: us
      GOOGLE_DOCUMENT_AI_PROCESSOR_ID:
      STRIPE_SECRET_KEY: replace-me
      STRIPE_STARTER_PRICE_ID:
      STRIPE_PRO_PRICE_ID:
      STRIPE_ENTERPRISE_PRICE_ID:
      RETENTION_CLEANUP_INTERVAL_MINUTES: 1440
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: ankane/pgvector:latest
    container_name: rag-llm-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag_llm
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_llm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rag-llm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rag-llm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rag
      MINIO_ROOT_PASSWORD: rag-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  minio-data:
