<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Relay — multi-tenant RAG platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="styles-extra.css" />
<style>
  body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="admin-dashboard.jsx"></script>
<script type="text/babel" src="admin-views.jsx"></script>
<script type="text/babel" src="portal.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>
<script type="text/babel" src="superadmin.jsx"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0d6e6e">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0d6e6e"/>
    <g transform="translate(420 240)" fill="#ffffff">
      <rect x="0" y="0" width="360" height="320" rx="32"/>
      <rect x="60" y="80" width="240" height="20" rx="6" fill="#0d6e6e"/>
      <rect x="60" y="130" width="180" height="14" rx="5" fill="#0d6e6e" opacity="0.55"/>
      <rect x="60" y="160" width="220" height="14" rx="5" fill="#0d6e6e" opacity="0.55"/>
      <rect x="60" y="190" width="150" height="14" rx="5" fill="#0d6e6e" opacity="0.55"/>
      <circle cx="180" cy="260" r="22" fill="#d97757"/>
    </g>
    <text x="600" y="640" text-anchor="middle" font-family="ui-monospace, monospace" font-size="28" fill="#ffffff" letter-spacing="6">RELAY</text>
  </svg>
</template>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "tenant": "northwind",
  "view": "dashboard",
  "primary": "#9f1239",
  "dark": false,
  "citationStyle": "sources",
  "viewerStyle": "page",
  "density": "regular"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = React.useState(t.view || 'dashboard');
  const [openedDoc, setOpenedDoc] = React.useState(null);
  const [openedPage, setOpenedPage] = React.useState(1);
  const [impersonating, setImpersonating] = React.useState(false);

  const isPlatform = window.PLATFORM_VIEWS.includes(view);

  const impersonate = (tenantId) => {
    setTweak('tenant', tenantId);
    setImpersonating(true);
    setView('dashboard');
  };
  const exitImpersonation = () => {
    setImpersonating(false);
    setView('overview');
  };

  // Build tenant from data + tweaks
  const baseTenant = window.TENANTS[t.tenant] || window.TENANTS.meridian;
  const tenant = { ...baseTenant, primary: t.primary || baseTenant.primary };
  const brand = { primary: tenant.primary };

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.dark ? 'dark' : 'light');
    document.documentElement.style.setProperty('--tenant-primary', tenant.primary);
    document.documentElement.style.setProperty('--tenant-primary-fg', '#ffffff');
    document.documentElement.style.setProperty('--tenant-bg', t.dark ? '#0a0e0e' : tenant.bg);
    document.documentElement.style.setProperty('--tenant-name', `"${tenant.name}"`);
  }, [t.dark, tenant.primary, tenant.bg, tenant.name]);

  const openDoc = (doc, page = 1) => { setOpenedDoc(doc); setOpenedPage(page); };
  const closeDoc = () => setOpenedDoc(null);

  const crumbs = {
    dashboard: ['Workspace', 'Overview'],
    documents: ['Workspace', 'Documents'],
    users: ['Workspace', 'Users'],
    branding: ['Workspace', 'Branding'],
    analytics: ['Workspace', 'Analytics'],
    billing: ['Workspace', 'Billing'],
    audit: ['Workspace', 'Audit log'],
    settings: ['Workspace', 'Settings'],
  };

  const adminViews = {
    dashboard: <DashboardView tenant={tenant} setView={setView} />,
    documents: <DocumentsView tenant={tenant} openDoc={openDoc} />,
    users: <UsersView tenant={tenant} />,
    branding: <BrandingView tenant={tenant} brand={brand} setBrand={(b)=>setTweak('primary', b.primary)} />,
    analytics: <AnalyticsView tenant={tenant} />,
    billing: <BillingView tenant={tenant} />,
    audit: <AuditView tenant={tenant} />,
    settings: <SettingsView />,
  };

  // Persona switcher (always visible)
  const PersonaSwitcher = () => (
    <div className="persona-bar" style={impersonating?{top:44}:{}}>
      <button className={`persona-btn ${view==='onboarding'?'active':''}`} onClick={()=>{setImpersonating(false);setView('onboarding');}}>Onboarding</button>
      <button className={`persona-btn ${isPlatform?'active':''}`} onClick={()=>{setImpersonating(false);setView('overview');}}>Super admin</button>
      <button className={`persona-btn ${(!isPlatform && view!=='onboarding' && view!=='portal')?'active':''}`} onClick={()=>setView('dashboard')}>Tenant admin</button>
      <button className={`persona-btn ${view==='portal'?'active':''}`} onClick={()=>setView('portal')}>End user</button>
    </div>
  );

  const platformViews = {
    overview: <FleetOverviewView setView={setView} impersonate={impersonate} />,
    tenants: <TenantsView impersonate={impersonate} />,
    incidents: <IncidentsView impersonate={impersonate} />,
    usage: <UsageBillingView />,
    models: <ModelsInfraView />,
    feature_flags: <FeatureFlagsView />,
    platform_audit: <PlatformAuditView />,
    releases: <FleetOverviewView setView={setView} impersonate={impersonate} />,
    support: <FleetOverviewView setView={setView} impersonate={impersonate} />,
  };

  return (
    <>
      {impersonating && <ImpersonationBanner tenant={tenant} exit={exitImpersonation} />}
      <PersonaSwitcher />
      {view === 'onboarding' && <OnboardingView setView={setView} />}
      {view === 'portal' && (
        <PortalView tenant={tenant} citationStyle={t.citationStyle} openDoc={openDoc} />
      )}
      {isPlatform && (
        <div className="app" style={{height: impersonating ? 'calc(100vh - 32px)' : '100vh', marginTop: impersonating ? 32 : 0}}>
          <PlatformSidebar view={view} setView={setView} />
          <div className="main">
            <Topbar
              crumbs={['Platform', view.replace('_',' ')]}
              actions={
                <>
                  <div className="searchbar"><Icon name="search" size={13} /><input placeholder="Search tenants, incidents…" /><span className="kbd">⌘K</span></div>
                  <button className="btn btn-ghost btn-icon"><Icon name="bell" /></button>
                </>
              }
            />
            <div className="content">{platformViews[view]}</div>
          </div>
        </div>
      )}
      {!['onboarding','portal'].includes(view) && !isPlatform && (
        <div className="app" style={{height: impersonating ? 'calc(100vh - 32px)' : '100vh', marginTop: impersonating ? 32 : 0}}>
          <SidebarNav view={view} setView={setView} tenant={tenant} />
          <div className="main">
            <Topbar
              crumbs={crumbs[view] || ['Workspace']}
              actions={
                <>
                  <div className="searchbar"><Icon name="search" size={13} /><input placeholder="Search anything…" /><span className="kbd">⌘K</span></div>
                  <button className="btn btn-ghost btn-icon"><Icon name="bell" /></button>
                  <button className="btn btn-ghost btn-icon" onClick={()=>setTweak('dark', !t.dark)}>
                    <Icon name={t.dark ? 'sun' : 'moon'} />
                  </button>
                </>
              }
            />
            <div className="content">{adminViews[view]}</div>
          </div>
        </div>
      )}

      {openedDoc && <DocViewer doc={openedDoc} page={openedPage} viewerStyle={t.viewerStyle} onClose={closeDoc} />}

      <TweaksPanel>
        <TweakSection label="Tenant" />
        <TweakRadio label="Workspace"
                    value={t.tenant}
                    options={[{value:'meridian',label:'Meridian Health'},{value:'northwind',label:'Northwind Legal'}]}
                    onChange={(v)=>{ setTweak({tenant:v, primary: window.TENANTS[v].primary}); }} />
        <TweakColor label="Brand color"
                    value={t.primary}
                    options={['#0d6e6e','#1e3a8a','#9f1239','#d97757','#7c3aed','#0891b2']}
                    onChange={(v)=>setTweak('primary', v)} />
        <TweakSection label="Theme" />
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v)=>setTweak('dark', v)} />
        <TweakSection label="End-user portal" />
        <TweakSelect label="Citation style"
                    value={t.citationStyle}
                    options={[
                      {value:'sources',label:'Sources strip (default)'},
                      {value:'cards',label:'Citation cards'},
                      {value:'footnotes',label:'Footnotes with snippets'},
                      {value:'inline',label:'Inline numbered only'},
                    ]}
                    onChange={(v)=>setTweak('citationStyle', v)} />
        <TweakRadio label="Doc viewer"
                    value={t.viewerStyle}
                    options={[{value:'page',label:'Page'},{value:'snippets',label:'Snippets'}]}
                    onChange={(v)=>setTweak('viewerStyle', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
